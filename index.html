<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MIO GEAR – Documents Viewer</title>
  <!-- Favicon -->
  <link rel="icon" type="image/jpg" 
        href="https://tse1.mm.bing.net/th/id/OIP.8vjxkeLe3gmfx9PnXMk1gQAAAA?r=0&rs=1&pid=ImgDetMain&o=7&rm=3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://imgcdn.zigwheels.ph/large/gallery/exterior/86/2887/yamaha-mio-gear-slant-front-view-full-image-360394.jpg') 
                  no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .button-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .tile {
      flex: 1 1 160px;
      max-width: 200px;
      height: 160px;
      background: rgba(0, 74, 173, 0.85);
      border: 2px solid transparent;
      border-radius: 8px;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tile:hover {
      border-color: #ff0000;
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
    }

    .tile.selected {
      border-color: #00ff00;
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.6);
    }

    .tile i {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .tile span {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    iframe {
      width: 100%;
      max-width: 900px;
      height: 70vh;
      border: none;
      border-radius: 6px;
      display: none;
    }

    iframe.active {
      display: block;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .tile {
        flex: 1 1 120px;
        max-width: 45%;
        height: 120px;
      }
      .tile i {
        font-size: 30px;
      }
      .tile span {
        font-size: 12px;
      }
      iframe {
        height: 60vh;
      }
    }

    @media (max-width: 480px) {
      .tile {
        max-width: 100%;
        height: 100px;
      }
      .tile i {
        font-size: 24px;
      }
      .tile span {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="button-bar">
    <div class="tile" onclick="showDoc('licence')">
      <i class="fa-solid fa-id-card"></i>
      <span>LICENCE</span>
    </div>

    <div class="tile" onclick="showDoc('or')">
      <i class="fa-solid fa-file-invoice"></i>
      <span>OR</span>
    </div>

    <div class="tile" onclick="showDoc('cr')">
      <i class="fa-solid fa-car"></i>
      <span>CR</span>
    </div>

    <div class="tile" onclick="showDoc('insurance')">
      <i class="fa-solid fa-shield-halved"></i>
      <span>INSURANCE</span>
    </div>

    <div class="tile" onclick="showDoc('validation')">
      <i class="fa-solid fa-certificate"></i>
      <span>CERTIFICATE</span>
    </div>
  </div>

  <!-- Iframes for documents -->
  <iframe id="cr" src="https://drive.google.com/file/d/1ma6rABzIrzPBeeQxVPP1o6BnJOURpgG1/preview"></iframe>
  <iframe id="or" src="https://drive.google.com/file/d/1agaUufgxe3yP-gDdzz8YBVsAyHTl_n8E/preview"></iframe>
  <iframe id="insurance" src="https://drive.google.com/file/d/1BzapPc6RFU-gc7L1OYiyIaxv-OGRBO7A/preview"></iframe>
  <iframe id="validation" src="https://drive.google.com/file/d/1xJjJ3Tle5LUXgjk2Qa521g3dgy-28Xf5/preview"></iframe>
  <iframe id="licence" src="https://drive.google.com/file/d/1S2fPESa6UlZCjS3p1lrKsfYBMwpclZLQ/preview"></iframe>

  <script>
    function showDoc(id) {
      document.querySelectorAll("iframe").forEach(frame => frame.classList.remove("active"));
      document.getElementById(id).classList.add("active");

      document.querySelectorAll(".tile").forEach(tile => tile.classList.remove("selected"));
      document.querySelector(`.tile[onclick="showDoc('${id}')"]`).classList.add("selected");
    }
    // Show CR by default
    window.onload = () => showDoc('cr');
  </script>
</body>
</html>
